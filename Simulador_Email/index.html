<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/app.css">
    <title>Simulador Email</title>
</head>
<body>
    <main class="main">
        <h1>Formulario Email</h1>
        <form class="container" action="">
            <section>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="ej: email@gmail.com">
            </section>
            <section>
                <label for="asunto">Asunto:</label>
                <input type="text" id="asunto" placeholder="Asunto Email">
            </section>
            <section>
                <label for="mensaje">Mensaje:</label>
                <textarea name="mensaje" id="mensaje" placeholder="Mensaje Email"></textarea>
            </section>
            <section class="section-btns">
                <input id="btn-submit" type="submit" value="Enviar" disabled>
                <input type="reset" value="Reset">
            </section>
        </form>
    </main>


    <!-- Scripts -->
     <script src="js/app.js"></script>
</body>
</html>
